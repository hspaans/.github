---
name: GitHub Wiki upload

on:
  push:
    branches:
      - master
    paths: [.github/wiki/**, .github/workflows/wiki.yml]
  workflow_dispatch:

concurrency:
  group: wiki
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  wiki:
    name: Publish to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{github.repository}}
          path: ${{github.repository}}

      - name: Checkout Wiki
        uses: actions/checkout@v4
        with:
          repository: ${{github.repository}}.wiki
          path: ${{github.repository}}.wiki

      - name: Push to wiki
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/${{github.repository}}.wiki"
          rsync -a --delete --exclude='.git/' "$GITHUB_WORKSPACE/${{github.repository}}/.github/wiki/" ./
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No wiki changes to commit"
          else
            git commit -m "action: wiki sync"
            git push
          fi
